version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Fetch Google Maps key from Secrets Manager
        - export NEXT_PUBLIC_GOOGLE_MAPS_KEY=$(aws secretsmanager get-secret-value --secret-id traverse/google-maps-key --query SecretString --output text --region ap-northeast-1)
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
