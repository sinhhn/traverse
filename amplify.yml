version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Fetch secrets from AWS Secrets Manager (traverse/prototype)
        - |
          SECRET=$(aws secretsmanager get-secret-value --secret-id traverse/prototype --query SecretString --output text --region ap-northeast-1 2>/dev/null || echo "")
          if echo "$SECRET" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            export NEXT_PUBLIC_GOOGLE_MAPS_KEY=$(echo "$SECRET" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('NEXT_PUBLIC_GOOGLE_MAPS_KEY', d.get('google_maps_key', '')))")
          else
            export NEXT_PUBLIC_GOOGLE_MAPS_KEY="$SECRET"
          fi
          echo "Google Maps key configured: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:0:10}..."
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
